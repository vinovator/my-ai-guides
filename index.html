<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub</title>
    <meta property="og:title" content="AI Hub">
    <meta property="og:description"
        content="Comprehensive guides for top AI orchestration frameworks (CrewAI, AutoGen, LangGraph, and more) and deep-dive multi-lesson tutorials (Neo4j and growing).">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vinovator.github.io/my-ai-guides/">
    <link rel="icon" type="image/svg+xml"
        href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/svgs/solid/layer-group.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <!-- Tailwind class marker (do not remove). The renderer below emits these classes
         dynamically; this hidden block guarantees Tailwind's CDN scanner generates
         them on first paint without needing a regex safelist. -->
    <div hidden aria-hidden="true" class="lg:grid-cols-3 lg:grid-cols-4 bg-blue-50 bg-purple-50 bg-orange-50 bg-sky-50 bg-yellow-50 bg-red-50 bg-green-50 bg-emerald-50 bg-teal-50 bg-gray-50 bg-gray-100 text-blue-600 text-blue-700 text-purple-600 text-purple-700 text-orange-600 text-orange-700 text-sky-500 text-sky-700 text-yellow-500 text-yellow-700 text-red-500 text-red-700 text-green-600 text-green-700 text-emerald-500 text-emerald-600 text-emerald-700 text-teal-500 text-teal-600 text-teal-700 text-gray-400 text-gray-600 text-gray-700 border-blue-100 border-purple-100 border-orange-100 border-sky-100 border-yellow-100 border-red-100 border-green-100 border-emerald-100 border-teal-100 border-gray-100 hover:border-blue-400 hover:border-purple-400 hover:border-orange-400 hover:border-sky-400 hover:border-yellow-400 hover:border-red-400 hover:border-green-400 hover:border-emerald-400 hover:border-teal-400 hover:border-gray-400 group-hover:text-blue-600 group-hover:text-purple-600 group-hover:text-orange-600 group-hover:text-sky-600 group-hover:text-yellow-600 group-hover:text-red-600 group-hover:text-green-600 group-hover:text-emerald-600 group-hover:text-teal-600 group-hover:text-gray-600"></div>

    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div
                        class="bg-gradient-to-r from-indigo-600 to-blue-600 text-white rounded-lg p-1.5 mr-3 shadow-md">
                        <i class="fas fa-layer-group text-sm"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-gray-900">AI <span
                            class="text-indigo-600">Hub</span></span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-white border-b border-gray-200 pt-20 pb-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight mb-4">
                The Agentic AI <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-blue-600">Reference
                    Library</span>
            </h1>
            <p class="text-xl text-gray-500 max-w-2xl mx-auto leading-relaxed">
                Master the top orchestration frameworks and dive deep with hands-on tutorials. From "Zero to Hero" guides to production-ready templates.
            </p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow w-full">
        <div id="hub"></div>
    </main>

    <footer class="bg-gray-50 border-t border-gray-200 py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center">
            <div class="mb-4 md:mb-0">
                <span class="font-bold text-gray-900 tracking-tight">AI Hub</span>
                <p class="text-sm text-gray-500 mt-1">Curated guides for the next generation of software.</p>
            </div>
            <div class="flex space-x-6 text-gray-400">
                <a href="#" class="hover:text-gray-900 transition-colors"><i class="fab fa-github text-xl"></i></a>
                <a href="#" class="hover:text-gray-900 transition-colors"><i class="fab fa-twitter text-xl"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // ---------------------------------------------------------------------
        // Hub card registry.
        // To add a new entry: append one object to CARDS with the right category.
        //   - type:'guide'    -> single-page .html file
        //   - type:'tutorial' -> folder of .md lessons rendered by tutorial.html
        // ---------------------------------------------------------------------

        const CATEGORIES = [
            { name: 'Tutorials',               cols: 3 },
            { name: 'Microsoft Ecosystem',     cols: 3 },
            { name: 'Google Ecosystem',        cols: 3 },
            { name: 'Orchestration & Workflow', cols: 3 },
            { name: 'Emerging Frameworks',     cols: 4 },
        ];

        const CARDS = [
            // ----- Microsoft Ecosystem -----
            {
                type: 'guide', category: 'Microsoft Ecosystem',
                title: 'Semantic Kernel', href: 'semantickernel.html',
                icon: 'fa-brain', accent: 'blue', iconColor: 'text-blue-700',
                badge: 'The Copilot Engine',
                tags: ['Python', 'C#', 'Java'],
                description: "Microsoft's enterprise SDK. Connects LLMs to existing code via Plugins, Planners, and Memories.",
            },
            {
                type: 'guide', category: 'Microsoft Ecosystem',
                title: 'AutoGen', href: 'autogen.html',
                icon: 'fa-comments', accent: 'purple',
                badge: 'Research Agentic',
                tags: ['Python', '.NET'],
                description: 'Multi-agent conversation patterns. Orchestrate dynamic group chats for complex problem solving.',
            },

            // ----- Google Ecosystem -----
            {
                type: 'guide', category: 'Google Ecosystem',
                title: 'Google ADK', href: 'googleadk.html',
                icon: 'fa-circle-nodes', accent: 'teal', iconColor: 'text-teal-700',
                badge: 'Agent Dev Kit',
                tags: ['Python', 'Gemini', 'Vertex AI'],
                description: "Google's official Agent Development Kit. Code-first, model-agnostic, with workflow agents, callbacks, evals, and a path to Vertex AI Agent Engine.",
            },

            // ----- Orchestration & Workflow -----
            {
                type: 'guide', category: 'Orchestration & Workflow',
                title: 'LangGraph', href: 'langgraph.html',
                icon: 'fa-project-diagram', accent: 'blue',
                badge: 'Graph-Based',
                tags: ['Python', 'JS/TS'],
                description: 'Build stateful, cyclic graphs. The standard for human-in-the-loop and complex flows.',
            },
            {
                type: 'guide', category: 'Orchestration & Workflow',
                title: 'CrewAI', href: 'crewai.html',
                icon: 'fa-users-cog', accent: 'orange',
                badge: 'Process-Driven',
                tags: ['Python'],
                description: 'Role-playing agents. Best for structured, process-driven automation tasks.',
            },
            {
                type: 'guide', category: 'Orchestration & Workflow',
                title: 'Haystack', href: 'haystack.html',
                icon: 'fa-search', accent: 'sky', iconColor: 'text-sky-500',
                badge: 'Pipeline',
                tags: ['Python'],
                description: 'Industrial strength NLP pipelines. Strong modularity for RAG and Search.',
            },

            // ----- Emerging Frameworks -----
            {
                type: 'guide', category: 'Emerging Frameworks',
                title: 'Smolagents', href: 'smolagents.html',
                icon: 'fa-rocket', accent: 'yellow', iconColor: 'text-yellow-500',
                badge: 'Code-Centric',
                tags: ['Python'],
                description: "Hugging Face's minimal, code-centric agents.",
            },
            {
                type: 'guide', category: 'Emerging Frameworks',
                title: 'PydanticAI', href: 'pydanticai.html',
                icon: 'fa-code', accent: 'red', iconColor: 'text-red-500',
                badge: 'Type-Safe',
                tags: ['Python'],
                description: 'Type-safe, validation-first agents for production.',
            },
            {
                type: 'guide', category: 'Emerging Frameworks',
                title: 'LlamaIndex', href: 'llamaindex.html',
                icon: 'fa-database', accent: 'green',
                badge: 'Data-Centric',
                tags: ['Python', 'TS'],
                description: 'Data-centric reasoning engines over your data.',
            },
            {
                type: 'guide', category: 'Emerging Frameworks',
                title: 'Phidata', href: 'phidata.html',
                icon: 'fa-memory', accent: 'emerald', iconColor: 'text-emerald-500',
                badge: 'Memory-First',
                tags: ['Python'],
                description: 'Memory & Database first agentic systems.',
            },
            {
                type: 'guide', category: 'Emerging Frameworks',
                title: 'Swarm', href: 'swarm.html',
                icon: 'fa-robot', accent: 'gray',
                iconBg: 'bg-gray-100', iconColor: 'text-gray-700', tagText: 'text-gray-600',
                badge: 'Handoff-Pattern',
                tags: ['Python'],
                description: 'Lightweight experimentation for agent handoffs.',
            },

            // ----- Tutorials -----
            {
                type: 'tutorial', category: 'Tutorials',
                title: 'Neo4j', href: 'tutorial.html?slug=Neo4j',
                icon: 'fa-project-diagram', accent: 'emerald',
                badge: 'Tutorial',
                tags: ['Cypher', 'GraphRAG', 'Python'],
                description: 'From complete novice to enterprise agentic context layers. Cypher, GraphRAG, and Neo4j as the memory spine for AI agents.',
            },
        ];

        // ---------------------------------------------------------------------
        // Renderer.
        // ---------------------------------------------------------------------

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function badgeHtml(card) {
            const a = card.accent;
            if (card.type === 'tutorial') {
                return `<span class="text-xs font-mono text-${a}-700 bg-${a}-50 border border-${a}-100 px-2 py-1 rounded uppercase tracking-wide font-bold">${escapeHtml(card.badge || 'Tutorial')}</span>`;
            }
            return `<span class="text-xs font-mono text-gray-400 bg-gray-50 px-2 py-1 rounded">${escapeHtml(card.badge)}</span>`;
        }

        function cardHtml(card) {
            const a = card.accent;
            const iconBg = card.iconBg || `bg-${a}-50`;
            const iconColor = card.iconColor || `text-${a}-600`;
            const titleHover = card.titleHover || `group-hover:text-${a}-600`;
            const tagBg = card.tagBg || `bg-${a}-50`;
            const tagText = card.tagText || `text-${a}-700`;
            const tagsHtml = (card.tags || []).map(t =>
                `<span class="inline-flex items-center px-2 py-1 rounded text-xs font-medium ${tagBg} ${tagText}">${escapeHtml(t)}</span>`
            ).join('');
            return `
                <a href="${escapeHtml(card.href)}" class="block group h-full">
                    <div class="bg-white rounded-xl border border-gray-200 p-6 h-full flex flex-col hover:shadow-md hover:border-${a}-400 transition-all duration-300">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 ${iconBg} rounded-lg flex items-center justify-center">
                                <i class="fas ${card.icon} ${iconColor} text-xl"></i>
                            </div>
                            ${badgeHtml(card)}
                        </div>
                        <h3 class="text-xl font-bold text-gray-900 mb-2 ${titleHover} transition-colors">${escapeHtml(card.title)}</h3>
                        <p class="text-gray-600 text-sm leading-relaxed mb-6 flex-1">${escapeHtml(card.description)}</p>
                        <div class="pt-4 border-t border-gray-100 flex items-center gap-2">${tagsHtml}</div>
                    </div>
                </a>
            `;
        }

        function sectionHtml(cat, cards) {
            if (!cards.length) return '';
            return `
                <div class="mb-16">
                    <div class="flex items-center mb-8">
                        <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider whitespace-nowrap mr-4">${escapeHtml(cat.name)}</h2>
                        <div class="h-px bg-gray-200 flex-1"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-${cat.cols} gap-6">
                        ${cards.map(cardHtml).join('')}
                    </div>
                </div>
            `;
        }

        function renderHub() {
            const hub = document.getElementById('hub');
            hub.innerHTML = CATEGORIES
                .map(cat => sectionHtml(cat, CARDS.filter(c => c.category === cat.name)))
                .join('');
        }

        renderHub();
    </script>
</body>

</html>
